name: Deploy OG Generator

on:
  push:
    branches: [ master ]
    paths:
      - 'services/og-generator/**'
      - '.github/workflows/deploy-og.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy OG Service
    runs-on: self-hosted
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build Release Binary
        run: |
          cd services/og-generator
          cargo build --release

      - name: Stop Service
        run: sudo systemctl stop og-generator || true

      - name: Deploy Binary and Assets
        run: |
          sudo mkdir -p /opt/og-generator/assets
          sudo cp services/og-generator/target/release/og-generator /opt/og-generator/
          sudo cp -r services/og-generator/assets/* /opt/og-generator/assets/
          sudo chown -R root:root /opt/og-generator
          sudo chmod +x /opt/og-generator/og-generator

      - name: Start Service
        run: sudo systemctl start og-generator
        
      - name: Check Service Status
        run: sudo systemctl status og-generator --no-pager